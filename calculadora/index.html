<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculadora">
      <input class="visor" type="text" disabled />
      <div class="botones">
        <div class="numeros">
          <button class="boton boton-numero" id="1">1</button>
          <button class="boton boton-numero" id="2">2</button>
          <button class="boton boton-numero" id="3">3</button>
          <button class="boton boton-numero" id="4">4</button>
          <button class="boton boton-numero" id="5">5</button>
          <button class="boton boton-numero" id="6">6</button>
          <button class="boton boton-numero" id="7">7</button>
          <button class="boton boton-numero" id="8">8</button>
          <button class="boton boton-numero" id="9">9</button>
          <button class="boton boton-numero" id="0">0</button>
          <button class="boton">.</button>
          <button class="boton" id="resultado">=</button>
        </div>
        <div class="operaciones">
          <button class="boton operacion" id="-">-</button>
          <button class="boton operacion" id="+">+</button>
          <button class="boton operacion" id="/">/</button>
          <button class="boton operacion" id="*">x</button>
          <button class="boton" id="borrar">C</button>
          <button class="boton" id="borrar_todo">CA</button>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
