<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Catalogo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <!-- Fonts-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap" rel="stylesheet">

  <!-- Styles-->
  <link rel="stylesheet" href="css/style.css">
  <!-- Icono-->
  <link rel="icon" type="image/x-icon" href="webp/flor.webp">

</head>

<body>
  <!-- <nav>
    <a href="#">Destacado</a>
    <a href="#">Catalogo</a>
  </nav> -->
  <header>
    <section class="principal">
      <div class="presentacion container">
        <img src="./july.png" alt="Yo" class="presentacion_img">
        <div class="descripcion">
          <h1 class="presentacion_titulo">Hola, me llamo Juli</h1>
          <p class="presentacion_texto">Realizo ramos a medida y por encargo, pensados para que cada persona pueda elegir la cantidad de flores, el estilo y los detalles que mejor representen lo que quiere transmitir</p>
        </div>
      </div>
    </section>
    <section class="destacados">
      <div class="container">
        <h2 class="text-center p-5 ">Mis trabajos destacados</h2>
  
        <div id="carouselExample" class="carousel slide p-5">
          <div class="carousel-inner">
  
            <!-- Slide 1 -->
            <div class="carousel-item active">
              <div class="row">
                <div class="col-4 ">
                  <img loading="lazy" src="webp/rojo1.webp" class="img-fluid imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/rojo2.webp" class="img-fluid imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/rojo3.webp" class="img-fluid imagen-carrusel" alt="imagen_destacada">
                </div>
              </div>
            </div>
  
            <!-- Slide 2 -->
            <div class="carousel-item">
              <div class="row">
                <div class="col-4">
                  <img loading="lazy" src="webp/azul1.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/azul2.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/azul3.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
              </div>
            </div>
  
            <!-- Slide 3 -->
            <div class="carousel-item">
              <div class="row">
                <div class="col-4">
                  <img loading="lazy" src="webp/amarillo1.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/amarillo2.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/amarillo3.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
              </div>
            </div>
            <!-- Slide 4 -->
            <div class="carousel-item">
              <div class="row">
                <div class="col-4">
                  <img loading="lazy" src="webp/boca1.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/boca2.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
                <div class="col-4">
                  <img loading="lazy" src="webp/boca4.webp" class="imagen-carrusel" alt="imagen_destacada">
                </div>
              </div>
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>
    </section>
  </header>
  <main>
    <h2>Catalogo Completo</h2>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
